<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instagram Dashboard</title>

<link rel="stylesheet" href="/css/dashboard.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="bg"></div>

<div class="floating orb1"></div>
<div class="floating orb2"></div>
<div class="floating orb3"></div>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div>

            <div class="brand">
                META
                <span>INSTAGRAM DASHBOARD</span>
            </div>

            <nav>

                <a class="active">
                    📊 Dashboard
                </a>

                <a>
                    📸 Posts
                </a>

            </nav>

        </div>

        <a href="/auth/logout" class="logout-btn">
            Logout
        </a>

    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

        <!-- TOPBAR -->
        <div class="topbar">

            <h1>
                Instagram Dashboard
            </h1>

            <div class="status">
                Connected
            </div>

        </div>

        <!-- STATS -->
        <div class="stats-grid">

            <div class="glass stat-card">
                <h3>Username</h3>
                <span id="username">--</span>
            </div>

            <div class="glass stat-card">
                <h3>Instagram ID</h3>
                <span id="userId">--</span>
            </div>

            <div class="glass stat-card">
                <h3>Total Posts</h3>
                <span id="postCount">0</span>
            </div>

            <div class="glass stat-card">
                <h3>Status</h3>
                <span>Active</span>
            </div>

        </div>

        <!-- ACCOUNT INFO -->
        <section class="glass pages-section">

            <div class="section-title">
                Account Information
            </div>

            <div style="
                display:flex;
                flex-direction:column;
                gap:15px;
                font-size:18px;
            ">

                <div>
                    <strong>Username:</strong>
                    <span id="igUsername">Loading...</span>
                </div>

                <div>
                    <strong>Instagram ID:</strong>
                    <span id="igId">--</span>
                </div>

            </div>

        </section>

        <!-- POSTS -->
        <section class="glass pages-section">

            <div class="section-title">
                Recent Instagram Posts
            </div>

            <div id="mediaContainer" class="posts-grid">

                <div class="glass post-card">

                    <div class="post-content">

                        <p class="post-caption">
                            Loading posts...
                        </p>

                    </div>

                </div>

            </div>

        </section>

    </main>

</div>

<script src="/js/instagram.js"></script>

</body>

</html>
