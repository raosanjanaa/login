<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Facebook Dashboard</title>
<link rel="stylesheet" href="/css/dashboard.css">



<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="bg"></div>

<div class="floating orb1"></div>
<div class="floating orb2"></div>
<div class="floating orb3"></div>

<div class="layout">

    <aside class="sidebar">

        <div class="brand">

            META

            <span>DASHBOARD</span>

        </div>

        <nav>

            <a class="active">
                Dashboard
            </a>

            <a>
                Profile
            </a>

            <a>
                Pages
            </a>

            <a>
                Posts
            </a>

            <a>
                Comments
            </a>

        </nav>

        <a href="/auth/logout">Logout</a>

    </aside>

    <main class="main-content">

        <div class="topbar">

            <h1>
                Facebook Dashboard
            </h1>

            <div class="status">
                Connected
            </div>

        </div>

        <section id="profileSection">

            <div class="glass profile-card">

                <div class="profile-left">

                    <img
                    id="profileImage"
                    src=""
                    alt="Profile">

                </div>

                <div class="profile-right">

                    <h2 id="profileName">
                        Loading...
                    </h2>

                    <p id="profileEmail">
                        Loading...
                    </p>

                    <p id="profileId">
                        Loading...
                    </p>

                </div>

            </div>

        </section>

        <section class="stats-grid">

            <div class="glass stat-card">

                <h3>Pages</h3>

                <span id="pageCount">
                    0
                </span>

            </div>

            <div class="glass stat-card">

                <h3>Posts</h3>

                <span>
                    --
                </span>

            </div>

            <div class="glass stat-card">

                <h3>Comments</h3>

                <span>
                    --
                </span>

            </div>

            <div class="glass stat-card">

                <h3>Status</h3>

                <span>
                    Active
                </span>

            </div>

        </section>

        <section class="glass pages-section">

            <div class="section-title">

                Managed Pages

            </div>

            <div id="pagesContainer">

                No pages loaded yet.

            </div>

        </section>

    </main>

</div>

<script src="/js/facebook.js"></script>

</body>
</html>
